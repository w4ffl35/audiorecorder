name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qt6-base-dev libgl1-mesa-dev ninja-build

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build

      - name: Package
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          package_dir="dist/audiorecorder-linux-x86_64"
          mkdir -p "$package_dir"
          cp build/audiorecorder "$package_dir/"
          cp README.md "$package_dir/"
          tar -C dist -czf "audiorecorder-${VERSION}-linux-x86_64.tar.gz" audiorecorder-linux-x86_64

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: audiorecorder-${{ github.ref_name }}-linux-x86_64.tar.gz

  build-windows:
    name: Build Windows Release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Up MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.3'
          host: windows
          target: desktop
          arch: win64_msvc2022_64

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Package
        shell: pwsh
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          $packageDir = Join-Path $PWD 'dist\audiorecorder-windows-x86_64'
          New-Item -ItemType Directory -Force -Path $packageDir | Out-Null
          Copy-Item 'build\Release\audiorecorder.exe' $packageDir
          Copy-Item 'README.md' $packageDir
          windeployqt --release --no-translations --compiler-runtime (Join-Path $packageDir 'audiorecorder.exe')
          Compress-Archive -Path "$packageDir\*" -DestinationPath "audiorecorder-$env:VERSION-windows-x86_64.zip"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: audiorecorder-${{ github.ref_name }}-windows-x86_64.zip

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-linux
      - build-windows

    steps:
      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/linux-release/*.tar.gz
            release-assets/windows-release/*.zip